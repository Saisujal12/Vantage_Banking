<!DOCTYPE html>
<html>
<head>
<title>Make Transaction | Vantage Banking</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#e3f2fd,#f4f6f8);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CARD */

.card{
background:white;
padding:40px;
width:100%;
max-width:420px;
border-radius:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
text-align:center;
animation:fadeIn 0.5s ease-in-out;
}

h2{
margin-bottom:25px;
color:#333;
}

/* INPUT FIELDS */

.input-group{
margin-bottom:18px;
text-align:left;
}

.input-group label{
font-size:14px;
color:#555;
display:block;
margin-bottom:6px;
}

.input-group input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
transition:0.3s;
}

.input-group input:focus{
border-color:#007bff;
outline:none;
box-shadow:0 0 5px rgba(0,123,255,0.4);
}

/* BUTTON */

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#007bff,#0056b3);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* MESSAGES */

.message{
margin-top:15px;
padding:10px;
border-radius:8px;
font-size:14px;
animation:fadeIn 0.3s ease-in-out;
}

.success{
background:#d4edda;
color:#155724;
border:1px solid #c3e6cb;
}

.error{
background:#f8d7da;
color:#721c24;
border:1px solid #f5c6cb;
}

/* ANIMATION */

@keyframes fadeIn{
from{opacity:0; transform:translateY(-5px);}
to{opacity:1; transform:translateY(0);}
}

/* MOBILE */

@media(max-width:480px){
.card{
padding:25px;
}
}

</style>
</head>

<body>

<div class="card">

<h2>💸 Make a Transaction</h2>

<form method="POST">
    {% csrf_token %}

    <div class="input-group">
        <label>Receiver Account Number</label>
        <input type="text" name="account_number" 
               placeholder="Enter Receiver Account No" required>
    </div>

    <div class="input-group">
        <label>Amount</label>
        <input type="number" name="amount" step="0.01"
               placeholder="Enter Amount" required>
    </div>

    <div class="input-group">
        <label>Your Password</label>
        <input type="password" name="password" 
               placeholder="Enter Your Password" required>
    </div>

    <button type="submit">Transfer Money</button>
</form>

{% if messages %}
    {% for message in messages %}
        <div class="message {{ message.tags }}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

</div>

</body>
</html>
